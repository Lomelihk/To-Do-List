{% load static %} <!-- Carga los archivos estáticos de Django -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Diseño responsive -->
    <title>To-Do List</title>
    
    <!-- Carga la fuente 'Nunito' de Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Enlaza la hoja de estilos principal -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <button id="dark-mode-toggle" aria-label="Toggle dark mode"></button>
    
    <!-- Contenedor principal que centra el contenido -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script>
        const darkModeToggle = document.getElementById('dark-mode-toggle');
        const body = document.body;
        const initialTheme = localStorage.getItem('theme');

        // Aplica el tema guardado al cargar la página
        if (initialTheme === 'dark-mode') {
            body.classList.add('dark-mode');
        } else {
            body.classList.remove('dark-mode');
        }

        // Alterna el tema al hacer clic en el botón
        darkModeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            // Guarda la preferencia de tema
            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark-mode');
            } else {
                localStorage.setItem('theme', 'light-mode');
            }
        });
    </script>
</body>
</html>
